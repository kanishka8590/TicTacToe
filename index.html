<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="container">

        <h1>Tic Tac Toe</h1>

        <div class="marker-select">
            <button id="chooseX">Play as X</button>
            <button id="chooseO">Play as O</button>
        </div>

        <div class="scoreboard">
            <div>X: <span id="scoreX">0</span></div>
            <div>O: <span id="scoreO">0</span></div>
        </div>

        <div class="mode-select">
            <button id="twoPlayer">Two Player</button>
            <button id="singlePlayer">Single Player</button>
        </div>

        <div id="board" class="board"></div>

        <button id="reset">Reset Game</button>

    </div>

    <div id="tears-container"></div>

    <script src="script.js"></script>

</body>
</html>
